# ===================================================================
# Tissue-Specific Human Cell Type Markers
# This file contains markers for cell types specific to certain tissues,
# or tissue-specific subtypes of general cell types.
# ===================================================================


# --- Cornea (眼角膜) ---
[["Cornea".minor]]
name = "Corneal EpC"
color = "#D8BFD8"
markers = ["KRT12", "KRT3", "KRT15"]

[["Cornea".minor]]
name = "Basal EpC"
color = ""
markers = ["KRT5", "KRT14", "ITGB4"]

[["Cornea".minor]]
name = "Superficial EpC"
color = ""
markers = ["DSC3", "DSP", "KRT24", "MUC21"]

[["Cornea".minor]]
name = "Limbal EpC"
color = "#FF6347"
markers = ["KRT13", "KRT14", "KRT19", "KRT4"]

[["Cornea".minor]]
name = "Limbal Stem Cells"
color = "#FF4500"
markers = ["KRT15", "ABCG2", "TRP63", "TP63", "LGALS7"]

[["Cornea".minor]]
name = "Progenitors"
color = ""
markers = ["PAX6", "MITF"]

[["Cornea".minor]]
name = "Corneal EndoC"
color = "#4682B4"
markers = ["PECAM1", "PTPRB", "CDH5", "ATP1A1"]

[["Cornea".minor]]
name = "Corneal Stromal"
color = "#20B2AA"
markers = ["DCN", "KERA", "LUM"]

[["Cornea".minor]]
name = "Keratocyte"
color = "#008B8B"
markers = ["KERA", "ALDH3A1", "COL6A1", "COL6A3"]

[["Cornea".minor]]
name = "Limbal Stromal"
color = "#5F9EA0"
markers = ["VIM", "PDGFRB"]

[["Cornea".minor]]
name = "Scleral Cells"
color = "#A0522D"
markers = ["COL1A1", "COL5A1", "DCN"]

[["Cornea".minor]]
name = "Iridocytes"
color = "#8A2BE2"
markers = ["TYR", "RPE65", "PMEL"]

[["Cornea".minor]]
name = "Corneal Nerve"
color = "#FFD700"
markers = ["TUBB3", "ENO2", "SYP", "GAP43", "SYT1"]


