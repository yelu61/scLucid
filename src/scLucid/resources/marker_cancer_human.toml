# =============================================================================
# Human Cancer Type Markers (v1.0)
# =============================================================================
# Cancer-type specific marker genes for tumor identification and characterization.
# These markers complement the base cell type markers by defining cancer-specific
# epithelial/tumor cell populations.
# =============================================================================

[["Pan-Cancer"]]
name = "Pan-Cancer"
color = "#FF0000"
markers = ["EPCAM", "KRT5", "KRT8", "KRT18", "KRT19", "MUC1", "CD24", "CD44", "ALCAM", "MET"]
description = "General epithelial/carcinoma markers"

[["Lung Cancer"]]
name = "Lung Cancer"
color = "#4169E1"
markers = ["NKX2-1", "SFTPC", "SFTPA1", "SFTPB", "AGER", "SCGB1A1", "SCGB3A2", "MUC5B", "MUC5AC"]
description = "Non-small cell lung cancer markers"
minor = [
    { name = "LUAD", color = "#6495ED", markers = ["NKX2-1", "SFTPC", "SFTPA1", "Napsin A (NAPSA)"], description = "Lung adenocarcinoma" },
    { name = "LUSC", color = "#4682B4", markers = ["KRT5", "KRT6A", "TP63", "SOX2"], description = "Lung squamous cell carcinoma" },
    { name = "SCLC", color = "#1E90FF", markers = ["ASCL1", "NEUROD1", "CHGA", "SYP", "NCAM1"], description = "Small cell lung cancer" }
]

[["Breast Cancer"]]
name = "Breast Cancer"
color = "#FF69B4"
markers = ["ESR1", "PGR", "ERBB2", "MKI67", "FOXA1", "GATA3", "KRT8", "KRT18", "MUC1"]
description = "Breast carcinoma markers"
minor = [
    { name = "ER+", color = "#FFB6C1", markers = ["ESR1", "PGR", "FOXA1", "GATA3", "TFF1", "GREB1"], description = "ER-positive breast cancer" },
    { name = "HER2+", color = "#FF1493", markers = ["ERBB2", "GRB7", "STARD3", "PGAP3"], description = "HER2-positive breast cancer" },
    { name = "TNBC", color = "#C71585", markers = ["KRT5", "KRT14", "EGFR", "VIM", "KIT"], description = "Triple-negative breast cancer" }
]

[["Colorectal Cancer"]]
name = "Colorectal Cancer"
color = "#8B4513"
markers = ["EPCAM", "KRT20", "CDX2", "FABP1", "REG4", "MUC2", "TFF3", "CEACAM5", "CA7"]
description = "Colorectal adenocarcinoma markers"
minor = [
    { name = "CMS1", color = "#A0522D", markers = ["IL6", "CXCL1", "CXCL10", "STAT1"], description = "Consensus Molecular Subtype 1 (MSI immune)" },
    { name = "CMS2", color = "#CD853F", markers = ["WNT5A", "TCF7L2", "MYC", "CCND1"], description = "Canonical subtype" },
    { name = "CMS3", color = "#D2691E", markers = ["KRAS", "AKT1", "MTOR", "SNAI1"], description = "Metabolic subtype" },
    { name = "CMS4", color = "#BC8F8F", markers = ["VIM", "TWIST1", "ZEB1", "TGFB1", "ACTA2"], description = "Mesenchymal subtype" }
]

[["Liver Cancer"]]
name = "Liver Cancer"
color = "#228B22"
markers = ["ALB", "AFP", "HNF4A", "CYP3A4", "CYP2E1", "GPC3", "ARG1", "ASGR1", "EPCAM"]
description = "Hepatocellular carcinoma markers"
minor = [
    { name = "HCC", color = "#32CD32", markers = ["ALB", "AFP", "GPC3", "HNF1A", "CYP3A4"], description = "Hepatocellular carcinoma" },
    { name = "ICC", color = "#006400", markers = ["KRT19", "KRT7", "EPCAM", "CFTR", " Sox9 (SOX9)"], description = "Intrahepatic cholangiocarcinoma" }
]

[["Gastric Cancer"]]
name = "Gastric Cancer"
color = "#FFD700"
markers = ["MUC5AC", "MUC6", "PGC", "GKN1", "GKN2", "TFF1", "TFF2", "REG4", "CHGA"]
description = "Gastric adenocarcinoma markers"
minor = [
    { name = "EBV+", color = "#DAA520", markers = ["PIK3CA", "PD-L1", "EBER1", "EBER2"], description = "EBV-positive gastric cancer" },
    { name = "MSI", color = "#B8860B", markers = ["MLH1", "MSH2", "MSH6", "PMS2"], description = "Microsatellite unstable" },
    { name = "CIN", color = "#F0E68C", markers = ["TP53", "ERBB2", "EGFR", "MYC"], description = "Chromosomally unstable" },
    { name = "GS", color = "#EEE8AA", markers = ["CDH1", "RHOA", "CLDN18", "MUC6"], description = "Genomically stable" }
]

[["Prostate Cancer"]]
name = "Prostate Cancer"
color = "#4682B4"
markers = ["KLK3", "AR", "NKX3-1", "TMPRSS2", "FOLH1", "ACPP", "AMACR"]
description = "Prostate adenocarcinoma markers"

[["Ovarian Cancer"]]
name = "Ovarian Cancer"
color = "#9370DB"
markers = ["PAX8", "WT1", "CA125 (MUC16)", "HE4 (WFDC2)", "EPCAM", "KRT7"]
description = "Ovarian carcinoma markers"
minor = [
    { name = "HGSOC", color = "#8A2BE2", markers = ["PAX8", "TP53", "WT1", "BRCA1", "BRCA2"], description = "High-grade serous ovarian cancer" },
    { name = "LGSOC", color = "#9932CC", markers = ["PAX8", "KRAS", "BRAF", "ERBB2"], description = "Low-grade serous ovarian cancer" }
]

[["Pancreatic Cancer"]]
name = "Pancreatic Cancer"
color = "#8B008B"
markers = ["KRT7", "KRT19", "MUC1", "MUC5AC", "MUC6", "CA19-9 (CA19-9)", "CEACAM5", "SMAD4"]
description = "Pancreatic ductal adenocarcinoma markers"
minor = [
    { name = "PDAC", color = "#9400D3", markers = ["KRT19", "MUC1", "SMAD4", "CDH17", "KRT7"], description = "Pancreatic ductal adenocarcinoma" }
]

[["Melanoma"]]
name = "Melanoma"
color = "#2F4F4F"
markers = ["MLANA", "PMEL", "TYR", "MITF", "SOX10", "S100B"]
description = "Melanoma markers"

[["Glioblastoma"]]
name = "Glioblastoma"
color = "#800080"
markers = ["GFAP", "EGFR", "PTEN", "IDH1", "MGMT", "OLIG2", "NES"]
description = "Glioblastoma multiforme markers"

# =============================================================================
# Pan-cancer atlas and malignancy evidence scaffold
# =============================================================================
# These sections are intentionally kept in marker_cancer_human.toml rather than
# separate TOML files. The routing happens through metadata + Manager views.
# Use these as placeholders for future pan-cancer scRNA atlas curation.
# =============================================================================

[["Pan-Cancer Atlas Programs"]]
name = "Pan-Cancer Atlas Programs"
color = "#e15759"
markers = []
metadata = { kind = "cancer_context", granularity = "program_family", compartment = "tumor", scope = "tumor_context", applies_to = ["Tumor", "Epithelial"], evidence_tier = "seed", source_type = "pan_cancer_atlas", review_status = "scaffold", use_for_global_annotation = false, use_for_state_annotation = true, use_for_malignancy_interpretation = true }
minor = [
    { name = "Epithelial tumor identity", color = "#d62728", markers = ["EPCAM", "KRT8", "KRT18", "KRT19", "MUC1"], negative_markers = ["PTPRC", "PECAM1", "COL1A1"], metadata = { kind = "tumor_evidence", granularity = "evidence", compartment = "tumor", lineage = "Epithelial", marker_role = "positive", evidence_tier = "seed", source_type = "pan_cancer_atlas", review_status = "needs_review", use_for_malignancy_interpretation = true } },
    { name = "EMT plasticity program", color = "#b56576", markers = ["VIM", "FN1", "SNAI1", "SNAI2", "ZEB1", "CDH2"], metadata = { kind = "functional_program", granularity = "program", compartment = "tumor", lineage = "Epithelial/Tumor", category = "plasticity", scope = "tumor_context", applies_to = ["Tumor", "Epithelial"], marker_role = "program", evidence_tier = "seed", source_type = "pan_cancer_atlas", review_status = "needs_review", use_for_state_annotation = true, use_for_malignancy_interpretation = true } },
    { name = "Cycling tumor program", color = "#a32121", markers = ["MKI67", "TOP2A", "PCNA", "UBE2C", "CENPF", "BIRC5"], metadata = { kind = "functional_program", granularity = "program", compartment = "tumor", lineage = "Tumor", category = "cell_cycle", scope = "tumor_context", applies_to = ["Tumor"], marker_role = "program", evidence_tier = "seed", source_type = "pan_cancer_atlas", review_status = "needs_review", use_for_state_annotation = true, use_for_malignancy_interpretation = true } },
    { name = "CAF activation program", color = "#c56543", markers = ["COL1A1", "COL1A2", "POSTN", "CTHRC1", "THY1", "FAP"], metadata = { kind = "functional_program", granularity = "program", compartment = "stromal", lineage = "Fibroblasts", category = "caf_activation", scope = "lineage_restricted", applies_to = ["Fibroblasts", "Stromal"], marker_role = "program", evidence_tier = "seed", source_type = "pan_cancer_atlas", review_status = "needs_review", use_for_state_annotation = true } },
    { name = "Angiogenic endothelial program", color = "#f1c40f", markers = ["KDR", "FLT1", "ESM1", "ANGPT2", "PECAM1", "VWF"], metadata = { kind = "functional_program", granularity = "program", compartment = "stromal", lineage = "Endothelial cells", category = "angiogenesis", scope = "lineage_restricted", applies_to = ["Endothelial cells"], marker_role = "program", evidence_tier = "seed", source_type = "pan_cancer_atlas", review_status = "needs_review", use_for_state_annotation = true } }
]

[["Malignancy Evidence"]]
name = "Malignancy Evidence"
color = "#6c757d"
markers = []
metadata = { kind = "tumor_evidence", granularity = "evidence_family", compartment = "mixed", scope = "tumor_context", applies_to = ["all"], evidence_tier = "seed", source_type = "expert_seed", review_status = "scaffold", use_for_global_annotation = false, use_for_malignancy_interpretation = true }
minor = [
    { name = "Carcinoma epithelial evidence", color = "#d62728", markers = ["EPCAM", "KRT8", "KRT18", "KRT19", "CLDN4", "MUC1"], negative_markers = ["PTPRC", "PECAM1", "COL1A1"], metadata = { kind = "tumor_evidence", granularity = "evidence", compartment = "tumor", lineage = "Epithelial", marker_role = "positive", evidence_tier = "seed", source_type = "expert_seed", review_status = "needs_review", use_for_malignancy_interpretation = true } },
    { name = "Squamous epithelial evidence", color = "#b22222", markers = ["KRT5", "KRT6A", "KRT14", "TP63", "SOX2"], negative_markers = ["PTPRC", "PECAM1"], metadata = { kind = "tumor_evidence", granularity = "evidence", compartment = "tumor", lineage = "Squamous epithelial", marker_role = "positive", evidence_tier = "seed", source_type = "expert_seed", review_status = "needs_review", use_for_malignancy_interpretation = true } },
    { name = "Diploid immune anchor", color = "#4e79a7", markers = ["PTPRC", "CD3D", "MS4A1", "LYZ", "NKG7"], negative_markers = ["EPCAM", "KRT8", "KRT18", "KRT19"], metadata = { kind = "tumor_evidence", granularity = "reference_anchor", compartment = "immune", marker_role = "negative_control", evidence_tier = "seed", source_type = "expert_seed", review_status = "needs_review", use_for_malignancy_interpretation = true } },
    { name = "Diploid stromal anchor", color = "#f28e2b", markers = ["COL1A1", "DCN", "PECAM1", "VWF", "RGS5"], negative_markers = ["EPCAM", "KRT8", "KRT18", "KRT19"], metadata = { kind = "tumor_evidence", granularity = "reference_anchor", compartment = "stromal", marker_role = "negative_control", evidence_tier = "seed", source_type = "expert_seed", review_status = "needs_review", use_for_malignancy_interpretation = true } }
]
