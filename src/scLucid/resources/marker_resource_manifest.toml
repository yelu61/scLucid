# =============================================================================
# scLucid Marker Resource Manifest
# =============================================================================
# Purpose:
# - Provide a stable map of marker resource files and their intended workflow use.
# - Keep biological marker curation separate from code-level manager logic.
# - Make future review/atlas-derived additions auditable and easy to route.
#
# Recommended per-entry metadata fields inside marker TOML resources:
# - kind: cell_type | state | functional_program | tumor_evidence | cancer_context
# - granularity: compartment | lineage | subtype | state | program | evidence
# - compartment: immune | stromal | epithelial | neural | tumor | mixed | artifact
# - lineage: broad lineage label when applicable
# - scope: all | lineage_restricted | tumor_context | cancer_type_specific
# - applies_to: list of compatible lineages/cancer types, or ["all"]
# - marker_role: positive | negative | exclusion | evidence | program
# - evidence_tier: seed | curated_review | atlas_supported | consensus | deprecated
# - source_type: expert_seed | review | pan_cancer_atlas | disease_atlas | literature
# - review_status: scaffold | needs_review | reviewed | conflict
# - use_for_global_annotation: true/false
# - use_for_state_annotation: true/false
# - use_for_malignancy_interpretation: true/false
# - source: optional nested source fields for future review/atlas curation
# - notes: free-text curation caveats; keep biological caveats here, not in code
# =============================================================================

[metadata]
version = "0.4.0"
last_updated = "2026-05-20"
description = "Manifest and curation contract for scLucid marker resources"
default_species = ["human", "mouse"]

[[resources]]
name = "marker_registry_human"
species = "human"
workflow = ["compartment_annotation", "lineage_annotation", "subtype_annotation", "state_annotation", "program_scoring", "artifact_qc", "doublet_lineage", "marker_evidence"]
status = "active"
description = "Unified human marker registry with explicit compartment, lineage, subtype, state, artifact, and functional_program sections"

[[resources]]
name = "marker_registry_mouse"
species = "mouse"
workflow = ["compartment_annotation", "lineage_annotation", "subtype_annotation", "state_annotation", "program_scoring", "artifact_qc", "doublet_lineage", "marker_evidence"]
status = "active"
description = "Unified mouse marker registry with explicit compartment, lineage, subtype, state, artifact, and functional_program sections"

[[resources]]
name = "marker_tissue_human"
species = "human"
workflow = ["tissue_specific_annotation", "subtype_annotation", "marker_evidence"]
status = "active"
description = "Human tissue-specific normal parenchymal and tissue-context marker entries"
schema = "scLucid_marker_tissue_resource_v2"
routing_note = "Top-level tissue entries are context anchors; child entries are routed by Manager as cell_type/tissue_subtype."

[[resources]]
name = "marker_tumor_human"
species = "human"
workflow = ["tumor_type_hint", "tumor_context", "malignancy_review", "cnv_assisted_annotation", "tumor_interpretation"]
status = "active"
description = "Human tumor marker resource: epithelial support, malignancy programs, tumor type hints, and cancer states"
schema = "scLucid_marker_tumor_resource_v2"
routing_note = "Tumor entries are excluded from global annotation and consumed as tumor interpretation evidence."

[[resources]]
name = "genesets_cancer_signatures"
species = "human"
workflow = ["program_scoring", "tumor_interpretation", "therapy_response", "llm_annotation_summary"]
status = "active"
description = "Cancer signature gene sets for module scoring; intentionally overlaps marker_tumor_human at the gene level but is not an annotation marker registry"

[[resources]]
name = "genesets_cancer_hallmarks"
species = "human"
workflow = ["program_scoring", "pathway_enrichment", "tumor_interpretation", "llm_annotation_summary"]
status = "active"
description = "Cancer hallmark gene sets for scoring/enrichment; kept separate from concise marker TOML resources"
