# =============================================================================
# Mouse Cell State Markers (Scaffold)
# =============================================================================
# Purpose:
# - Mirror the human state/program resource so mouse workflows can use the same
#   Manager interface and metadata contract.
# - Markers are seed placeholders and should be reviewed with mouse-specific
#   literature or converted ortholog resources before high-confidence use.
# =============================================================================

[metadata]
version = "0.1.0"
last_updated = "2026-05-14"
species = "mouse"
description = "Scaffold for mouse cell state, artifact, and functional programs"
curation_status = "scaffold"

