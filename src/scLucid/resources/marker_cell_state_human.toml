# =============================================================================
# Human Cell State Markers (v2.0 - Scoped State Programs)
# =============================================================================
# Design goals:
# - Move from a flat dictionary to a hierarchy of state/program categories
# - Support lineage-aware annotation via metadata:
#   - kind: "state"
#   - category: high-level program family
#   - scope: "all" or "lineage_restricted"
#   - applies_to: list of compatible lineages / compartments
#   - alias_of: optional legacy-compatible short name
# =============================================================================

[["Artifact and QC States"]]
name = "Artifact and QC States"
color = "#c0c0c0"
markers = []
minor = [
    { name = "Stress-high", color = "#FF69B4", markers = ["HSPA1A", "HSPB1", "HSPA6", "HSP90AA1", "ATF3", "DDIT3", "FOS", "JUN"], metadata = { kind = "state", category = "artifact_qc", scope = "all", applies_to = ["all"], alias_of = "Stress" } },
    { name = "Oxidative stress", color = "#FF4500", markers = ["NFE2L2", "HMOX1", "NQO1", "SOD1", "SOD2", "GPX1", "CAT", "TXN"], metadata = { kind = "state", category = "artifact_qc", scope = "all", applies_to = ["all"], alias_of = "Oxidative Stress" } },
    { name = "Hypoxia response", color = "#800080", markers = ["VEGFA", "ADM", "NDRG1", "BNIP3", "CA9", "SLC2A1", "PGK1"], metadata = { kind = "state", category = "artifact_qc", scope = "all", applies_to = ["all"], alias_of = "Hypoxia" } },
    { name = "DNA damage response", color = "#6495ED", markers = ["ATM", "ATR", "CHEK1", "CHEK2", "RAD51", "BRCA1", "BRCA2", "H2AFX", "TP53BP1", "GADD45A"], metadata = { kind = "state", category = "artifact_qc", scope = "all", applies_to = ["all"], alias_of = "DNA Damage" } },
    { name = "Apoptosis-like", color = "#8B0000", markers = ["BAX", "CASP3", "CASP7", "CASP8", "CASP9", "FAS", "TP53", "BCL2L11", "BBC3", "CYCS"], metadata = { kind = "state", category = "artifact_qc", scope = "all", applies_to = ["all"], alias_of = "Apoptosis" } },
    { name = "Autophagy-like", color = "#008080", markers = ["BECN1", "MAP1LC3B", "ATG5", "ATG7", "SQSTM1", "LAMP1", "DRAM1"], metadata = { kind = "state", category = "artifact_qc", scope = "all", applies_to = ["all"], alias_of = "Autophagy" } }
]

[["Cell Cycle and Growth States"]]
name = "Cell Cycle and Growth States"
color = "#b04a4a"
markers = []
minor = [
    { name = "Cycling", color = "#a32121", markers = ["MKI67", "TOP2A", "PCNA", "CCNB1", "CCNB2"], metadata = { kind = "state", category = "cell_cycle", scope = "all", applies_to = ["all"], alias_of = "Proliferating" } },
    { name = "Progenitor-like", color = "#00CED1", markers = ["SOX2", "NESTIN", "PROM1", "PAX6", "ASCL1"], metadata = { kind = "state", category = "growth_potential", scope = "lineage_restricted", applies_to = ["Stem Cell", "Neural", "Epithelial"], alias_of = "Progenitor" } },
    { name = "Differentiation-associated", color = "#228B22", markers = ["CDKN1A", "CDKN1B", "SOX9", "GATA1", "GATA3", "MYOD1", "RUNX2"], metadata = { kind = "state", category = "growth_potential", scope = "all", applies_to = ["all"], alias_of = "Differentiation" } }
]

[["Immune Functional States"]]
name = "Immune Functional States"
color = "#f0ad4e"
markers = []
minor = [
    { name = "Immune activation", color = "#FF8C00", markers = ["CD69", "IL2RA", "FOS", "JUNB", "CD38", "CD44"], metadata = { kind = "state", category = "immune_activation", scope = "lineage_restricted", applies_to = ["T cells", "CD4+ T", "CD8+ T", "NK cells", "B cells"], alias_of = "Activation" } },
    { name = "Inflammatory response", color = "#B22222", markers = ["IL1B", "TNF", "NFKB1", "NFKBIA", "CXCL8", "PTGS2", "ICAM1"], metadata = { kind = "state", category = "immune_activation", scope = "lineage_restricted", applies_to = ["Myeloid", "Monocytes", "Macrophages", "Dendritic cells"], alias_of = "Inflammation" } },
    { name = "T cell exhaustion-like", color = "#A9A9A9", markers = ["PDCD1", "LAG3", "HAVCR2", "TIGIT", "CTLA4", "ENTPD1", "TOX", "CD244"], metadata = { kind = "state", category = "immune_dysfunction", scope = "lineage_restricted", applies_to = ["T cells", "CD8+ T", "CD4+ T"], alias_of = "Exhaustion" } },
    { name = "Migration-associated", color = "#20B2AA", markers = ["MMP2", "MMP9", "CXCR4", "S100A4", "ITGB1", "CD44", "VIM"], metadata = { kind = "state", category = "immune_migration", scope = "lineage_restricted", applies_to = ["T cells", "NK cells", "Myeloid", "Macrophages"], alias_of = "Migration" } }
]

[["Metabolic and Plasticity States"]]
name = "Metabolic and Plasticity States"
color = "#6c8ebf"
markers = []
minor = [
    { name = "Metabolic activation", color = "#4682B4", markers = ["LDHA", "SLC2A1", "ENO1", "PKM", "PGK1", "GAPDH"], metadata = { kind = "state", category = "metabolism", scope = "all", applies_to = ["all"] } },
    { name = "SASP-like", color = "#A0522D", markers = ["IL6", "IL8", "CXCL1", "MMP1", "MMP3", "SERPINE1"], metadata = { kind = "state", category = "senescence", scope = "all", applies_to = ["all"], alias_of = "SASP" } },
    { name = "EMT-like", color = "#FFD700", markers = ["VIM", "SNAI1", "SNAI2", "ZEB1", "ZEB2", "CDH2", "FN1", "TWIST1", "CDH1"], metadata = { kind = "state", category = "plasticity", scope = "lineage_restricted", applies_to = ["Epithelial", "Tumor", "Stromal"], alias_of = "EMT" } }
]
