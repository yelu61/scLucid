# =============================================================================
# Human T-cell Hierarchical Markers (v0.1)
# =============================================================================
# Purpose:
# - Support lineage -> subtype -> state-aware annotation in immune-focused projects
# - Keep QC/doublet marker resources stable by defining a dedicated annotation file
# Naming note:
# - Prefer evidence-grounded, modular labels over over-interpreted fixed subset names
# =============================================================================

[["T cell hierarchy"]]
name = "T cells"
color = "#1ba169"
markers = ["CD3D", "CD3E", "CD3G", "TRAC", "CD2", "IL7R"]
minor = [
    { name = "CD4+ T", color = "#2ca02c", markers = ["CD4", "IL7R", "LTB", "MAL", "TCF7", "LEF1"] },
    { name = "CD8+ T", color = "#ff7f0e", markers = ["CD8A", "CD8B", "CCL5", "NKG7", "PRF1", "GZMB"] },
    { name = "Treg", color = "#3b845e", markers = ["FOXP3", "IL2RA", "CTLA4", "TNFRSF18", "IKZF2"] },
    { name = "Tfh-like", color = "#10a674", markers = ["CXCR5", "BCL6", "IL21", "MAF", "PDCD1"] },
    { name = "MAIT", color = "#9467bd", markers = ["TRAV1-2", "KLRB1", "SLC4A10", "ZBTB16"] },
    { name = "NKT-like", color = "#04650d", markers = ["KLRD1", "NKG7", "TYROBP", "FCGR3A", "TRAC"] },
    { name = "Gamma delta T", color = "#6b8e23", markers = ["TRDC", "TRGC1", "TRGC2", "NKG7"] },
    { name = "Naive-like T", color = "#11aa00", markers = ["TCF7", "SELL", "CCR7", "LEF1", "MAL"] },
    { name = "Memory-like T", color = "#8cfd7e", markers = ["IL7R", "LTB", "S100A4", "MAL", "LTB"] },
    { name = "Cytotoxic T", color = "#ff6600", markers = ["CCL5", "NKG7", "PRF1", "GZMB", "FGFBP2"] },
    { name = "Exhaustion-like T", color = "#cc5500", markers = ["PDCD1", "TOX", "LAG3", "HAVCR2", "TIGIT"] },
    { name = "Trm-like T", color = "#ffaa00", markers = ["ZNF683", "HOPX", "ITGAE", "CXCR6", "CD69"] }
]
